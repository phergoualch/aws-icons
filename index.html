<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse, search, and download the latest official AWS Architecture Icons as SVG or PNG in any size. Refreshed weekly from AWS."
    />
    <meta name="color-scheme" content="dark light" />
    <title>AWS Icons Catalog – search and download official AWS architecture icons</title>
    <script>
      const stored = localStorage.getItem("aws-icons-theme");
      const theme =
        stored === "light" || stored === "dark"
          ? stored
          : window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
      document.documentElement.dataset.theme = theme;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
